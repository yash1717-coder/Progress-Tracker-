<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setup – Progress Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0f;--card:#13131a;--accent:#6c63ff;--accent2:#ff6584;
      --text:#e8e8f0;--muted:#6b6b80;--border:#222230;
    }
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      overflow:hidden;
    }
    .bg-blobs{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:pulse 8s ease-in-out infinite;}
    .blob1{width:500px;height:500px;background:var(--accent);top:-100px;left:-100px;animation-delay:0s;}
    .blob2{width:400px;height:400px;background:var(--accent2);bottom:-80px;right:-80px;animation-delay:3s;}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

    .setup-card{
      position:relative;z-index:1;background:var(--card);border:1px solid var(--border);
      border-radius:24px;padding:56px 48px;width:100%;max-width:480px;
      box-shadow:0 40px 80px rgba(0,0,0,.6);
      animation:slideUp .6s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

    .logo{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;
      color:var(--accent);text-transform:uppercase;margin-bottom:32px;opacity:.8;}
    h1{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1.1;margin-bottom:8px;}
    .subtitle{color:var(--muted);font-size:15px;margin-bottom:40px;}
    
    .field{margin-bottom:24px;}
    label{display:block;font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
      color:var(--muted);margin-bottom:8px;}
    input{
      width:100%;background:#0d0d14;border:1px solid var(--border);border-radius:12px;
      padding:14px 18px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;
      outline:none;transition:border-color .2s,box-shadow .2s;
    }
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.15);}
    input::placeholder{color:var(--muted);}
    
    .btn{
      width:100%;padding:16px;border:none;border-radius:12px;
      background:linear-gradient(135deg,var(--accent),#8b5cf6);
      color:#fff;font-size:16px;font-weight:600;cursor:pointer;
      font-family:'DM Sans',sans-serif;letter-spacing:.02em;
      transition:opacity .2s,transform .1s;
      margin-top:8px;
    }
    .btn:hover{opacity:.9;transform:translateY(-1px);}
    .btn:active{transform:translateY(0);}
    
    .emoji-big{font-size:48px;margin-bottom:16px;display:block;}
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
  </div>

  <div class="setup-card">
    <div class="logo">⚡ Progress Tracker</div>
    <span class="emoji-big">👋</span>
    <h1>Let's get you set up</h1>
    <p class="subtitle">Just a couple of details to personalise your dashboard.</p>

    <div class="field">
      <label>Your Name</label>
      <input id="name" type="text" placeholder="e.g. Rohan Sharma" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Your City (for weather)</label>
      <input id="location" type="text" placeholder="e.g. Mumbai" autocomplete="off"/>
    </div>
    <button class="btn" onclick="doSetup()">Launch My Dashboard →</button>
  </div>

  <script>
    async function doSetup(){
      const name = document.getElementById('name').value.trim();
      const location = document.getElementById('location').value.trim();
      if(!name){alert('Please enter your name!');return;}
      const btn = document.querySelector('.btn');
      btn.textContent = 'Setting up…';btn.disabled=true;
      const res = await fetch('/api/setup',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,location:location||'Mumbai'})
      });
      if(res.ok) window.location.href='/';
    }
    document.addEventListener('keydown',e=>{if(e.key==='Enter')doSetup();});
  </script>
</body>
</html>
